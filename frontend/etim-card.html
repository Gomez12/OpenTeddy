<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETIM Classification Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #12141a;
            --bg-surface: #1a1d23;
            --bg-elevated: #22252d;
            --bg-hover: #2a2d36;
            --border: #2e3240;
            --border-subtle: #252833;
            --text-primary: #e8e4dd;
            --text-secondary: #9a968e;
            --text-muted: #5e5b55;
            --amber: #d4a054;
            --amber-soft: #d4a05422;
            --amber-glow: #d4a05440;
            --amber-bright: #e8b868;
            --green: #6ec87a;
            --green-soft: #6ec87a18;
            --blue: #5b9bd5;
            --blue-soft: #5b9bd518;
            --font-display: 'Playfair Display', Georgia, serif;
            --font-mono: 'DM Mono', 'SF Mono', monospace;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-mono);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        .card-wrapper {
            width: 100%;
            max-width: 560px;
            animation: fadeUp 0.5s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── Main card ─── */
        .etim-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        /* ─── Hero header ─── */
        .card-hero {
            padding: 28px 28px 24px;
            background:
                radial-gradient(ellipse at 20% 0%, var(--amber-glow) 0%, transparent 60%),
                var(--bg-surface);
            border-bottom: 1px solid var(--border-subtle);
        }

        .card-eyebrow {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }

        .card-group-badge {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--amber);
            background: var(--amber-soft);
            border: 1px solid var(--amber-glow);
            padding: 3px 10px;
            border-radius: 100px;
            font-weight: 500;
        }

        .card-group-name {
            font-size: 11px;
            color: var(--text-muted);
        }

        .card-class-code {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.1;
            margin-bottom: 6px;
            text-decoration: none;
            display: inline-block;
            transition: color 0.15s;
        }

        .card-class-code:hover {
            color: var(--amber-bright);
            text-decoration: underline;
        }

        .card-class-desc {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .card-class-desc-nl {
            font-size: 13px;
            color: var(--text-muted);
            font-style: italic;
            margin-top: 2px;
        }

        /* ─── Features grid ─── */
        .card-section {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .card-section:last-child {
            border-bottom: none;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            cursor: default;
        }

        .section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            font-weight: 500;
        }

        .section-count {
            font-size: 10px;
            color: var(--text-muted);
            background: var(--bg-elevated);
            padding: 2px 8px;
            border-radius: 100px;
            border: 1px solid var(--border-subtle);
        }

        .features-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .feature-item {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 7px 10px;
            background: var(--bg-elevated);
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            transition: all 0.15s;
            position: relative;
            overflow: hidden;
        }

        .feature-item:hover {
            border-color: var(--border);
            color: var(--text-primary);
        }

        .feature-item .feature-nl {
            display: none;
            font-size: 11px;
            color: var(--text-muted);
            font-style: italic;
            margin-top: 2px;
        }

        .feature-item:hover .feature-nl {
            display: block;
        }

        .feature-item:hover .feature-en {
            color: var(--amber-bright);
        }

        /* ─── Synonyms ─── */
        .synonyms-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .synonym-tag {
            font-size: 11px;
            color: var(--text-secondary);
            background: var(--bg-deep);
            border: 1px solid var(--border-subtle);
            padding: 4px 10px;
            border-radius: 100px;
            transition: all 0.15s;
        }

        .synonym-tag:hover {
            border-color: var(--amber-glow);
            color: var(--amber-bright);
            background: var(--amber-soft);
        }

        .synonym-tag.nl {
            color: var(--text-muted);
            border-style: dashed;
        }

        .synonym-tag.nl:hover {
            color: var(--blue);
            border-color: var(--blue-soft);
            background: var(--blue-soft);
        }

        /* ─── Language toggle for synonyms ─── */
        .lang-toggle {
            display: flex;
            gap: 2px;
            background: var(--bg-deep);
            border-radius: 100px;
            padding: 2px;
            border: 1px solid var(--border-subtle);
        }

        .lang-btn {
            font-family: var(--font-mono);
            font-size: 10px;
            padding: 3px 10px;
            border: none;
            border-radius: 100px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.05em;
        }

        .lang-btn.active {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        /* ─── Raw JSON toggle ─── */
        .raw-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 28px 14px;
        }

        .raw-btn {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            background: none;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            padding: 6px 14px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .raw-btn:hover {
            color: var(--text-secondary);
            border-color: var(--border);
        }

        .raw-btn .chevron {
            transition: transform 0.2s;
            font-size: 14px;
        }

        .raw-btn.open .chevron {
            transform: rotate(180deg);
        }

        .raw-json {
            display: none;
            margin: 0 28px 20px;
            padding: 16px;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 11px;
            line-height: 1.6;
            color: var(--text-secondary);
            overflow-x: auto;
            white-space: pre;
            max-height: 400px;
            overflow-y: auto;
        }

        .raw-json.visible {
            display: block;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .raw-json::-webkit-scrollbar { width: 6px; height: 6px; }
        .raw-json::-webkit-scrollbar-track { background: transparent; }
        .raw-json::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* JSON syntax colors */
        .json-key { color: var(--amber); }
        .json-string { color: var(--green); }
        .json-bracket { color: var(--text-muted); }

        @media (max-width: 500px) {
            .features-grid { grid-template-columns: 1fr; }
            .card-hero { padding: 22px 20px 20px; }
            .card-section { padding: 16px 20px; }
            .card-class-code { font-size: 26px; }
        }
    </style>
</head>
<body>

<div class="card-wrapper">
    <div class="etim-card" id="etim-card"></div>
</div>

<script>
const data = {
    "group_code": "EG000028",
    "group_description_en": "Lamps",
    "group_description_nl": "Lampen",
    "class_code": "EC001959",
    "class_description_en": "LED-lamp/Multi-LED",
    "class_description_nl": "LED-lamp/multi-LED",
    "features": [
        {"en": "No dim function", "nl": "Geen dimfunctie"},
        {"en": "Energy Efficiency Index (EEI)", "nl": "Energie-efficiëntie-index (EEI)"},
        {"en": "Total harmonic distortion", "nl": "Totale harmonische vervorming"},
        {"en": "Nominal voltage", "nl": "Nominale spanning"},
        {"en": "Nominal current", "nl": "Nominale stroom"},
        {"en": "Power factor", "nl": "Vermogensfactor"},
        {"en": "Lamp power", "nl": "Lampvermogen"},
        {"en": "Voltage type", "nl": "Spanningstype"},
        {"en": "Suitable for electronic ballast", "nl": "Geschikt voor elektronisch voorschakelapparaat"},
        {"en": "Suitable for magnetic ballast", "nl": "Geschikt voor magnetisch voorschakelapparaat"},
        {"en": "Colour temperature", "nl": "Kleurtemperatuur"},
        {"en": "Luminous flux", "nl": "Lichtstroom"},
        {"en": "Socket", "nl": "Lampfitting"},
        {"en": "Lamp shape", "nl": "Lamvorm"}
    ],
    "synonyms_nl": ["LED lamp", "LED buis", "LED spot", "LED kaars", "LED peer", "LED capsule", "LED-TL", "Retrofit-lamp", "Bollamp", "Peerlamp", "Kaarslamp", "Globelamp", "Kogellamp"],
    "synonyms_en": ["LED lamp", "LED tube", "LED spot", "LED candle", "LED bulb", "LED capsule", "LED luster", "Retrofit lamp", "Bulblamp", "Pearlamp", "Globelamp"]
};

function renderCard(d) {
    const card = document.getElementById("etim-card");

    const featuresHtml = d.features.map(f =>
        `<div class="feature-item">
            <div class="feature-en">${esc(f.en)}</div>
            <div class="feature-nl">${esc(f.nl)}</div>
        </div>`
    ).join("");

    const synEnHtml = (d.synonyms_en || []).map(s => `<span class="synonym-tag">${esc(s)}</span>`).join("");
    const synNlHtml = (d.synonyms_nl || []).map(s => `<span class="synonym-tag nl">${esc(s)}</span>`).join("");

    const jsonHtml = syntaxHighlight(JSON.stringify(d, null, 2));

    card.innerHTML = `
        <div class="card-hero">
            <div class="card-eyebrow">
                <span class="card-group-badge">${esc(d.group_code)}</span>
                <span class="card-group-name">${esc(d.group_description_en)} / ${esc(d.group_description_nl)}</span>
            </div>
            <a class="card-class-code" href="https://prod.etim-international.com/Class/Details?classId=${encodeURIComponent(d.class_code)}" target="_blank" rel="noopener">${esc(d.class_code)}</a>
            <div class="card-class-desc">${esc(d.class_description_en)}</div>
            <div class="card-class-desc-nl">${esc(d.class_description_nl)}</div>
        </div>

        <div class="card-section">
            <div class="section-header">
                <span class="section-title">Features</span>
                <span class="section-count">${d.features.length}</span>
            </div>
            <div class="features-grid">${featuresHtml}</div>
        </div>

        <div class="card-section">
            <div class="section-header">
                <span class="section-title">Synonyms</span>
                <div class="lang-toggle">
                    <button class="lang-btn active" data-lang="en" onclick="toggleSynLang('en')">EN</button>
                    <button class="lang-btn" data-lang="nl" onclick="toggleSynLang('nl')">NL</button>
                    <button class="lang-btn" data-lang="all" onclick="toggleSynLang('all')">All</button>
                </div>
            </div>
            <div class="synonyms-wrap" id="synonyms-en">${synEnHtml}</div>
            <div class="synonyms-wrap" id="synonyms-nl" style="display:none">${synNlHtml}</div>
            <div class="synonyms-wrap" id="synonyms-all" style="display:none">${synEnHtml}${synNlHtml}</div>
        </div>

        <div class="raw-toggle">
            <button class="raw-btn" onclick="toggleRaw(this)">
                <span>View raw JSON</span>
                <span class="chevron">&#9662;</span>
            </button>
        </div>
        <div class="raw-json" id="raw-json">${jsonHtml}</div>
    `;
}

function toggleSynLang(lang) {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    document.getElementById('synonyms-en').style.display = lang === 'en' ? 'flex' : 'none';
    document.getElementById('synonyms-nl').style.display = lang === 'nl' ? 'flex' : 'none';
    document.getElementById('synonyms-all').style.display = lang === 'all' ? 'flex' : 'none';
}

function toggleRaw(btn) {
    const el = document.getElementById('raw-json');
    btn.classList.toggle('open');
    el.classList.toggle('visible');
    btn.querySelector('span').textContent = el.classList.contains('visible') ? 'Hide raw JSON' : 'View raw JSON';
}

function syntaxHighlight(json) {
    return esc(json)
        .replace(/"([^"]+)"(?=\s*:)/g, '<span class="json-key">"$1"</span>')
        .replace(/:\s*"([^"]*?)"/g, ': <span class="json-string">"$1"</span>')
        .replace(/[{}\[\]]/g, '<span class="json-bracket">$&</span>');
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

renderCard(data);
</script>
</body>
</html>
